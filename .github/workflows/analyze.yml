name: tsv1 analyzer

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: Local run label
        required: true
        type: string
      parts:
        description: Shard count, 1..256
        required: true
        type: string
      asset:
        description: Parsed analyzer asset
        required: true
        type: string
      analyzer_args_json:
        description: JSON list of analyzer CLI args
        required: true
        type: string

run-name: tsv1 ${{ inputs.run_label }}

jobs:
  prepare_data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      asset: ${{ steps.metadata.outputs.asset }}
      data_cache_key: ${{ steps.metadata.outputs.data_cache_key }}
      matrix_json: ${{ steps.metadata.outputs.matrix_json }}
      parts: ${{ steps.metadata.outputs.parts }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare workflow metadata
        id: metadata
        env:
          ASSET: ${{ inputs.asset }}
          PARTS: ${{ inputs.parts }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import subprocess
          import sys
          asset = os.environ["ASSET"]
          parts = int(os.environ["PARTS"])
          if parts < 1 or parts > 256:
              raise SystemExit("parts must be between 1 and 256")
          sha = subprocess.check_output([sys.executable, "download_asset.py", "--dataset-sha"], text=True).strip()
          print(f"asset={asset}")
          print(f"parts={parts}")
          print(f"data_cache_key=tsv1-data-{asset}-{sha}")
          print("matrix_json=" + json.dumps({"part": list(range(parts))}, separators=(",", ":")))
          PY

      - name: Restore prepared asset data
        id: restore_data
        uses: actions/cache/restore@v6
        with:
          path: preprocessed/${{ steps.metadata.outputs.asset }}
          key: ${{ steps.metadata.outputs.data_cache_key }}

      - name: Download asset from Hugging Face
        if: steps.restore_data.outputs.cache-hit != 'true'
        run: python download_asset.py --asset "${{ steps.metadata.outputs.asset }}" --data-dir preprocessed

      - name: Save prepared asset data
        if: steps.restore_data.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: preprocessed/${{ steps.metadata.outputs.asset }}
          key: ${{ steps.metadata.outputs.data_cache_key }}

  analyze:
    needs: prepare_data
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.prepare_data.outputs.matrix_json) }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore prepared asset data
        id: restore_data
        uses: actions/cache/restore@v6
        with:
          path: preprocessed/${{ needs.prepare_data.outputs.asset }}
          key: ${{ needs.prepare_data.outputs.data_cache_key }}

      - name: Install dependencies and run shard
        env:
          ANALYZER_ARGS_JSON: ${{ inputs.analyzer_args_json }}
        run: |
          python -m pip install -r requirements.txt
          python run_shard.py \
            --args-json "$ANALYZER_ARGS_JSON" \
            --part ${{ matrix.part }} \
            --parts ${{ needs.prepare_data.outputs.parts }} \
            --jobs 4 \
            --out-dir results

      - name: Upload shard result
        uses: actions/upload-artifact@v7
        with:
          name: shard-${{ matrix.part }}
          path: results/
          if-no-files-found: error
          retention-days: 1
