name: tsv1 analyzer

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: Local run label
        required: true
        type: string
      parts:
        description: Shard count, 1..256
        required: true
        type: string
      analyzer_args_json:
        description: JSON list of analyzer CLI args
        required: true
        type: string

run-name: tsv1 ${{ inputs.run_label }}

jobs:
  prepare_data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      asset: ${{ steps.asset.outputs.asset }}
      data_cache_key: ${{ steps.cache_key.outputs.data_cache_key }}
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
      parts: ${{ steps.matrix.outputs.parts }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Parse asset
        id: asset
        env:
          ANALYZER_ARGS_JSON: ${{ inputs.analyzer_args_json }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          args = json.loads(os.environ["ANALYZER_ARGS_JSON"])
          print(f"asset={args[0]}")
          PY

      - name: Build shard matrix
        id: matrix
        env:
          PARTS: ${{ inputs.parts }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          parts = int(os.environ["PARTS"])
          if parts < 1 or parts > 256:
              raise SystemExit("parts must be between 1 and 256")
          print(f"parts={parts}")
          print("matrix_json=" + json.dumps({"part": list(range(parts))}, separators=(",", ":")))
          PY

      - name: Build data cache key
        id: cache_key
        run: |
          sha=$(python download_asset.py --dataset-sha)
          echo "data_cache_key=tsv1-data-${{ steps.asset.outputs.asset }}-$sha" >> "$GITHUB_OUTPUT"

      - name: Restore prepared asset data
        id: restore_data
        uses: actions/cache/restore@v6
        with:
          path: preprocessed/${{ steps.asset.outputs.asset }}
          key: ${{ steps.cache_key.outputs.data_cache_key }}

      - name: Download asset from Hugging Face
        if: steps.restore_data.outputs.cache-hit != 'true'
        run: python download_asset.py --asset "${{ steps.asset.outputs.asset }}" --data-dir preprocessed

      - name: Save prepared asset data
        if: steps.restore_data.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: preprocessed/${{ steps.asset.outputs.asset }}
          key: ${{ steps.cache_key.outputs.data_cache_key }}

  analyze:
    needs: prepare_data
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.prepare_data.outputs.matrix_json) }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore prepared asset data
        id: restore_data
        uses: actions/cache/restore@v6
        with:
          path: preprocessed/${{ needs.prepare_data.outputs.asset }}
          key: ${{ needs.prepare_data.outputs.data_cache_key }}

      - name: Require prepared asset data
        if: steps.restore_data.outputs.cache-hit != 'true'
        run: |
          echo "Prepared asset data cache was not found for ${{ needs.prepare_data.outputs.asset }}" >&2
          exit 1

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify numba
        run: python -c "from trigger_strategy.replay import NUMBA_AVAILABLE; raise SystemExit(0 if NUMBA_AVAILABLE else 2)"

      - name: Run shard
        env:
          ANALYZER_ARGS_JSON: ${{ inputs.analyzer_args_json }}
        run: >-
          python run_shard.py
          --args-json "$ANALYZER_ARGS_JSON"
          --part ${{ matrix.part }}
          --parts ${{ needs.prepare_data.outputs.parts }}
          --jobs 4
          --out-dir results

      - name: Upload shard result
        uses: actions/upload-artifact@v7
        with:
          name: shard-${{ matrix.part }}
          path: results/
          if-no-files-found: error
          retention-days: 1
